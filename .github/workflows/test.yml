name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GODOT_VERSION: "4.6.1"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Download Godot
        run: |
          wget -q "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip" \
            -O godot.zip
          unzip -q godot.zip
          chmod +x "Godot_v${GODOT_VERSION}-stable_linux.x86_64"
          sudo mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot

      - name: Install GUT
        run: |
          git clone --depth 1 https://github.com/bitwes/Gut.git /tmp/gut
          cp -r /tmp/gut/addons/gut addons/gut

      - name: Import project
        run: timeout 120 godot --headless --import 2>&1 || true

      - name: Run tests
        run: godot --headless -s addons/gut/gut_cmdln.gd -gexit
